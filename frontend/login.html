<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="auth-container">
    <h2>Acessar seu Portfólio</h2>
    <form>
      <!-- FIX: autocomplete ajuda gerenciadores de senha -->
      <input type="email" id="email" placeholder="Email" autocomplete="email">
      <!-- FIX: Enter no campo senha agora dispara o login -->
      <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
      <button type="button" id="btn-login">Entrar</button>
      <button type="button" id="btn-cadastro">Criar Conta</button>
    </form>
    <p id="auth-erro"></p>
  </main>
  <script type="module" src="../backend/auth.js"></script>
</body>
</html>
